        .fade-in {
    opacity: 0;              /* niewidoczne na start */
    transform: translateY(20px); /* lekko przesunięte w dół */
    animation: fadeInAnim 1.5s forwards; /* animacja 1.5s */
}

@keyframes fadeInAnim {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
        body {

        .promo-left, .promo-right {
            position: fixed;
            top: 100px;
            width: 160px;
            display: flex;
            flex-direction: column;

        }

        .promo-right {

        }

        .promo-left img, .promo-right img {
            width: 150px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .promo-left img:hover, .promo-right img:hover {
            transform: scale(1.05);
        }

        @media (max-width: 800px) {
            .promo-left, .promo-right {
                display: none;
